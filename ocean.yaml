name: ocean
label: "Ocean"
description: "Bright coastal blue with deep navy text — clean and crisp"

palette:
  background: "#e8f4fc"
  midground: "#08203e"
  foreground:
    hex: "#000000"
    alpha: 0
  warmGlow: "rgba(15, 95, 175, 0.1)"
  noiseOpacity: 0.15

typography:
  fontSans: '"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
  baseSize: "15px"
  lineHeight: "1.55"
  letterSpacing: "-0.005em"

layout:
  radius: "0.5rem"
  density: "comfortable"
