name: sky
label: "Sky"
description: "Airy pale blue with soft indigo text — open and light"

palette:
  background: "#f4faff"
  midground: "#1a3f6f"
  foreground:
    hex: "#000000"
    alpha: 0
  warmGlow: "rgba(100, 180, 240, 0.15)"
  noiseOpacity: 0.1

typography:
  fontSans: '"Nunito", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  fontMono: '"DM Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
  baseSize: "15px"
  lineHeight: "1.6"
  letterSpacing: "0.01em"

layout:
  radius: "1rem"
  density: "comfortable"
